<!DOCTYPE html>
<html>
<head>
<title>GeneGuard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url("https://images.unsplash.com/photo-1588776814546-ec7e6c6c0e0d");
    background-size: cover;
    color: white;
}

.card {
    background: rgba(0,0,0,0.8);
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container mt-4">

<h1 class="text-center">🧬 GeneGuard Dashboard</h1>

<div class="row">

<!-- LEFT FORM -->
<div class="col-md-4">
<div class="card p-3">

<form method="POST" enctype="multipart/form-data">

<input class="form-control mb-2" name="name" placeholder="Name" required>
<input class="form-control mb-2" name="relation" placeholder="Relation">
<input class="form-control mb-2" name="age" placeholder="Age">

<input class="form-control mb-2" name="symptoms" placeholder="Symptoms">

<textarea class="form-control mb-2" name="report" placeholder="Doctor Notes"></textarea>

<input type="file" name="file" class="form-control mb-2">

<button class="btn btn-success w-100">Add Patient</button>

</form>

</div>
</div>

<!-- RIGHT TABLE -->
<div class="col-md-8">
<div class="card p-3">

<table class="table table-dark">

<tr>
<th>Name</th>
<th>Symptoms</th>
<th>AI Risk</th>
<th>Genetic</th>
<th>Actions</th>
</tr>

{% for m in data %}
<tr>
<td>{{m.name}}</td>
<td>{{m.symptoms}}</td>
<td>{{m.ai}}</td>
<td>{{m.genetic}}</td>

<td>
<a href="/report/{{loop.index0}}" class="btn btn-warning btn-sm">PDF</a>

{% if m.file %}
<a href="/uploads/{{m.file}}" class="btn btn-info btn-sm">File</a>
{% endif %}

<a href="/delete/{{loop.index0}}" class="btn btn-danger btn-sm">Delete</a>
</td>

</tr>
{% endfor %}

</table>

</div>
</div>

</div>
</div>

</body>
</html>
